<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meta Pixel Check — Configurazione</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f3f4f6;color:#1f2937;padding:2rem 1rem}
main{max-width:720px;margin:0 auto}
h1{font-size:1.4rem;color:#1e3a5f;margin-bottom:.25rem}
p.sub{color:#6b7280;font-size:.9rem;margin-bottom:1.5rem}
.card{background:#fff;border-radius:8px;padding:1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:1rem}
label{display:block;font-weight:600;font-size:.9rem;color:#374151;margin-bottom:.3rem}
input,select,textarea{width:100%;padding:.6rem;border:1px solid #d1d5db;border-radius:6px;font-size:.95rem;font-family:inherit}
textarea{min-height:200px;font-family:monospace;font-size:.85rem}
input:focus,textarea:focus{outline:2px solid #1e3a5f;outline-offset:-1px}
.row{display:flex;gap:1rem}
.row>*{flex:1}
.check-group{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.3rem}
.check-group label{font-weight:400;font-size:.9rem;display:flex;align-items:center;gap:.3rem}
.check-group input[type=checkbox]{width:auto}
.actions{display:flex;gap:.75rem;margin-top:1rem}
button{background:#1e3a5f;color:#fff;border:none;padding:.6rem 1.2rem;border-radius:6px;cursor:pointer;font-size:.95rem}
button:hover{background:#2c5282}
button.secondary{background:#6b7280}
button.secondary:hover{background:#4b5563}
button:disabled{opacity:.5;cursor:not-allowed}
.toast{padding:.75rem 1rem;border-radius:6px;margin-bottom:1rem;font-size:.9rem;display:none}
.toast.ok{display:block;background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.toast.err{display:block;background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.status{font-size:.85rem;color:#6b7280;margin-top:.5rem}
code{background:#e5e7eb;padding:.15rem .4rem;border-radius:3px;font-size:.85rem}
a{color:#2563eb}

/* Status panel */
.status-card{padding:1.25rem}
.status-header{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
.pulse{width:12px;height:12px;border-radius:50%;background:#9ca3af;flex-shrink:0}
.pulse.pending{background:#f59e0b;animation:pulse 1s infinite}
.pulse.in_progress{background:#3b82f6;animation:pulse 1s infinite}
.pulse.completed{background:#22c55e}
.pulse.failure{background:#ef4444}
.pulse.skipped{background:#9ca3af}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.status-steps{margin:.5rem 0}
.step{display:flex;align-items:center;gap:.5rem;padding:.35rem .5rem;border-radius:4px;font-size:.85rem}
.step.active{background:#eff6ff;font-weight:600}
.step.done{color:#6b7280}
.step .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.step .dot.pending{background:#d1d5db}
.step .dot.done{background:#22c55e}
.step .dot.running{background:#3b82f6;animation:pulse .8s infinite}
.step .dot.fail{background:#ef4444}
.status-link{margin-top:.75rem;font-size:.9rem}
</style>
</head>
<body>

<main>
  <h1>⚙️ Meta Pixel Check</h1>
  <p class="sub">Configura lo scan automatico che viene eseguito su GitHub Actions</p>

  <div id="toast" class="toast"></div>

  <div class="card" id="loginCard">
    <label>GitHub Personal Access Token</label>
    <input type="password" id="tokenInput" placeholder="ghp_...">
    <p class="status">Serve un token con permessi <code>repo</code> per leggere/scrivere config.json su GitHub.
    <a href="https://github.com/settings/tokens/new?scopes=repo&description=CheckMetaPixel" target="_blank">Crea token</a></p>
    <div class="actions"><button onclick="login()">Collegati</button></div>
  </div>

  <div id="configCard" style="display:none">
    <div class="card">
      <label>Email destinatario report (più indirizzi separati da ;)</label>
      <input type="text" id="emailInput" placeholder="report@azienda.it; altro@partner.it">
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label>Orario scan</label>
          <input type="time" id="timeInput">
        </div>
        <div>
          <label>Fuso orario</label>
          <select id="timezoneInput">
            <option value="Europe/Rome" selected>Europa/Roma (UTC+1/+2)</option>
          </select>
        </div>
      </div>
    </div>

    <div class="card">
      <label>Frequenza</label>
      <div class="check-group" id="freqGroup">
        <label><input type="radio" name="frequency" value="weekly" checked> Giorni specifici (settimanale)</label>
        <label><input type="radio" name="frequency" value="daily"> Ogni giorno</label>
        <label><input type="radio" name="frequency" value="monthly"> Una volta al mese</label>
      </div>
    </div>

    <div class="card" id="daysCard">
      <label>Giorni della settimana</label>
      <div class="check-group" id="daysGroup">
        <label><input type="checkbox" value="Mon"> Lun</label>
        <label><input type="checkbox" value="Tue"> Mar</label>
        <label><input type="checkbox" value="Wed"> Mer</label>
        <label><input type="checkbox" value="Thu"> Gio</label>
        <label><input type="checkbox" value="Fri"> Ven</label>
        <label><input type="checkbox" value="Sat"> Sab</label>
        <label><input type="checkbox" value="Sun"> Dom</label>
      </div>
    </div>

    <div class="card" id="monthDayCard" style="display:none">
      <label>Giorno del mese</label>
      <input type="number" id="monthDayInput" min="1" max="31" value="1">
      <p class="status">Lo scan verrà eseguito il giorno <span id="monthDayLabel">1</span> di ogni mese</p>
    </div>

    <div class="card">
      <label>Siti da controllare (un URL per riga)</label>
      <textarea id="sitesInput" placeholder="https://www.esempio.it"></textarea>
    </div>

    <div class="card">
      <div class="actions">
        <button id="saveBtn" onclick="save()">💾 Salva configurazione</button>
        <button class="secondary" id="scanBtn" onclick="testScan()">▶️ Avvia scan ora</button>
      </div>
    </div>

    <div class="card" id="statusCard" style="display:none">
      <div class="status-header">
        <span class="pulse" id="statusDot"></span>
        <span id="statusText">...</span>
        <span style="margin-left:auto;font-size:.8rem;color:#9ca3af" id="statusElapsed"></span>
      </div>
      <div class="status-steps" id="statusSteps"></div>
      <div class="status-link" id="statusLink"></div>
    </div>
  </div>
</main>

<script>
const REPO = 'ADVision-Barletta/Check_Meta_Pixel';
const STATUS_LABELS = {
  queued: 'In coda...',
  in_progress: 'Scansione in corso...',
  completed_success: '✅ Scan completato',
  completed_failure: '❌ Scan fallito',
  completed_skipped: '⏭️ Scan saltato (orario/giorno non configurati)',
};

let token = localStorage.getItem('gh_token') || '';
let pollTimer = null;

function $(id) { return document.getElementById(id); }

function show(msg, ok) {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast ' + (ok ? 'ok' : 'err');
  t.style.display = 'block';
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(() => {
    t.style.display = '';
    t.className = 'toast';
  }, 5000);
}

async function api(method, path, body) {
  const r = await fetch(`https://api.github.com/repos/${REPO}${path}`, {
    method,
    headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({ message: r.statusText }));
    throw new Error(e.message);
  }
  const text = await r.text();
  return text ? JSON.parse(text) : null;
}

function login() {
  const t = $('tokenInput').value.trim();
  if (!t) return show('Inserisci il token', false);
  token = t;
  localStorage.setItem('gh_token', t);
  loadConfig();
}

function logout() {
  token = '';
  localStorage.removeItem('gh_token');
  $('loginCard').style.display = 'block';
  $('configCard').style.display = 'none';
  show('Disconnesso', true);
}

function toggleFreq(freq) {
  $('daysCard').style.display = freq === 'weekly' ? 'block' : 'none';
  $('monthDayCard').style.display = freq === 'monthly' ? 'block' : 'none';
}

function updateMonthDayLabel() {
  const v = $('monthDayInput').value;
  $('monthDayLabel').textContent = v;
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('#freqGroup input').forEach(r => {
    r.addEventListener('change', () => toggleFreq(r.value));
  });
  $('monthDayInput').addEventListener('input', updateMonthDayLabel);
});

async function loadConfig() {
  try {
    $('loginCard').style.display = 'none';
    $('configCard').style.display = 'block';

    const data = await api('GET', '/contents/config.json');
    const cfg = JSON.parse(atob(data.content.replace(/\n/g, '')));
    window._configSha = data.sha;

    $('emailInput').value = cfg.email || '';
    $('timeInput').value = cfg.time || '17:00';
    $('sitesInput').value = (cfg.sites || []).join('\n');

    const freq = cfg.frequency || 'weekly';
    document.querySelectorAll('#freqGroup input').forEach(r => {
      r.checked = r.value === freq;
    });
    toggleFreq(freq);

    $('monthDayInput').value = cfg.monthDay || 1;
    updateMonthDayLabel();

    document.querySelectorAll('#daysGroup input').forEach(cb => {
      cb.checked = (cfg.days || []).includes(cb.value);
    });
  } catch (err) {
    show('Errore caricamento: ' + err.message, false);
  }
}

async function save() {
  const days = [...document.querySelectorAll('#daysGroup input:checked')].map(cb => cb.value);
  const sites = $('sitesInput').value.split('\n').map(s => s.trim()).filter(Boolean);

  const cfg = {
    email: $('emailInput').value.trim(),
    time: $('timeInput').value,
    frequency: $('freqGroup').querySelector('input:checked')?.value || 'weekly',
    monthDay: parseInt($('monthDayInput').value) || 1,
    days: [...document.querySelectorAll('#daysGroup input:checked')].map(cb => cb.value),
    sites,
  };

  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(cfg, null, 2))));
    await api('PUT', '/contents/config.json', {
      message: 'auto: aggiornata configurazione',
      content,
      sha: window._configSha,
    });
    window._configSha = (await api('GET', '/contents/config.json')).sha;
    show('✅ Configurazione salvata su GitHub!', true);
  } catch (err) {
    show('Errore salvataggio: ' + err.message, false);
  }
}

// --- Live scan status ---

function updateStatusPanel(run) {
  const dot = $('statusDot');
  const text = $('statusText');
  const link = $('statusLink');
  const steps = $('statusSteps');

  const status = run.status;
  const conclusion = run.conclusion;
  const key = conclusion ? `${status}_${conclusion}` : status;

  dot.className = 'pulse';
  text.textContent = STATUS_LABELS[key] || '...';

  if (status === 'in_progress') dot.classList.add('in_progress');
  else if (conclusion === 'success') dot.classList.add('completed');
  else if (conclusion === 'failure') dot.classList.add('failure');
  else if (conclusion === 'skipped') dot.classList.add('skipped');
  else dot.classList.add('pending');

  steps.innerHTML = status === 'in_progress'
    ? '<p style="color:#6b7280;font-size:.85rem">Lo scan è in esecuzione. I log completi sono disponibili su GitHub.</p>'
    : '';

  link.innerHTML = `<a href="${run.html_url}" target="_blank">📋 Vedi log completo su GitHub →</a>`;
}

async function pollStatus() {
  try {
    const runs = await api('GET', '/actions/workflows/scan.yml/runs?per_page=5');
    if (!runs.workflow_runs || !runs.workflow_runs.length) return;

    // Find the run triggered after we dispatched (filters out stale runs)
    const run = runs.workflow_runs.find(r => new Date(r.created_at) > window._dispatchTime);
    if (!run) return;

    const created = new Date(run.created_at);
    const elapsed = Math.round((Date.now() - created) / 1000);
    $('statusElapsed').textContent = `${elapsed}s`;

    if (run.status !== 'completed') {
      const jobs = await api('GET', `/actions/runs/${run.id}/jobs`).catch(() => ({ jobs: [] }));
      run._jobs = jobs.jobs || [];
    }

    updateStatusPanel(run);

    const conclusion = run.conclusion;
    if (run.status === 'completed') {
      clearInterval(pollTimer);
      pollTimer = null;
      $('scanBtn').disabled = false;
    }
  } catch (err) {
    // silently retry
  }
}

async function testScan() {
  try {
    $('statusCard').style.display = 'block';
    $('statusText').textContent = 'Avvio scan...';
    $('statusDot').className = 'pulse pending';
    $('statusSteps').innerHTML = '';
    $('statusLink').innerHTML = '';
    $('statusElapsed').textContent = '';
    $('scanBtn').disabled = true;

    if (pollTimer) clearInterval(pollTimer);

    window._dispatchTime = new Date();
    await api('POST', '/actions/workflows/scan.yml/dispatches', { ref: 'master' });

    show('✅ Scan avviato!', true);

    // Wait a few seconds then start polling
    await new Promise(r => setTimeout(r, 5000));
    await pollStatus();
    pollTimer = setInterval(pollStatus, 5000);
  } catch (err) {
    $('scanBtn').disabled = false;
    show('Errore: ' + err.message, false);
  }
}

if (token) { loadConfig(); }
</script>
</body>
</html>
