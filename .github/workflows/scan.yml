name: Scan programmato

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Imposta Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache Chromium (Puppeteer)
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: puppeteer-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Installa dipendenze
        run: npm ci

      - name: Verifica schedulazione (giorno + orario da config.json)
        id: schedule
        run: |
          node scheduler.js && echo "run=true" >> "$GITHUB_OUTPUT" || echo "run=false" >> "$GITHUB_OUTPUT"

      - name: Genera sites.txt da config.json
        if: steps.schedule.outputs.run == 'true'
        run: jq -r '.sites[]' config.json > sites.txt

      - name: Esegui scan e invia report
        if: steps.schedule.outputs.run == 'true'
        run: |
          EMAIL=$(jq -r '.email // empty' config.json)
          if [ -z "$EMAIL" ]; then echo "Email non configurata"; exit 1; fi
          node check-pixel.js --email-to "$EMAIL"
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
